<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garagem dos Antigos Mexidos</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1f;
            color: #f5f5f7;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header-banner {
            padding: 30px 20px;
            background: linear-gradient(135deg, #b71c1c 0%, #7f0000 100%);
            border-bottom: 4px solid #ff5252;
            text-align: center;
        }

        .header-banner h1 {
            margin: 0;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
        }

        .header-banner p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #ffcdd2;
            font-style: italic;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
            flex: 1;
        }

        .main-card {
            background-color: #23232e;
            border: 1px solid #38384a;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h2 {
            color: #ff5252;
            font-size: 18px;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        p {
            color: #cbd5e1;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Container Responsivo para o iframe do YouTube */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Proporção 16:9 (Cinema) */
            height: 0;
            overflow: hidden;
            border-radius: 6px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.7);
            background-color: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #64748b;
            border-top: 1px solid #23232e;
            background-color: #141419;
        }
    </style>
</head>
<body>

    <div class="header-banner">
        <h1>Antigos &amp; Mexidos</h1>
        <p>Projetos de garagem e motores preparados</p>
    </div>

    <div class="container">
        <div class="main-card">
            <h2>Destaque da Semana</h2>
            <p>
                Confira abaixo o registro do projeto em ação. Modificações de época, ronco forte e a verdadeira essência da preparação automotiva em detalhes.
            </p>
            
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/Q-xz4p7swyA?si=HoVASrP_603U_dR-" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© Garagem dos Antigos Mexidos - Respeite os Clássicos, Acelere os Mexidos.</p>
    </div>

</body>
</html>
